<div class="investment-form-container">
  <h2>{{ isEditing ? 'Edit Investment' : 'Add New Investment' }}</h2>

  <div *ngIf="errorMessage" class="error-message">
    <strong>Error:</strong> {{ errorMessage }}<br>
    <small>Make sure the backend server is running on http://localhost:3000</small>
  </div>

  <div *ngIf="loading" class="loading">
    Loading...
  </div>

  <form *ngIf="!loading" (ngSubmit)="onSubmit()" #investmentForm="ngForm">
    <div class="form-group">
      <label for="website_app_name">Platform/Website/App *</label>
      <input
        type="text"
        id="website_app_name"
        name="website_app_name"
        [(ngModel)]="investment.website_app_name"
        class="form-control"
        required
        placeholder="e.g., HDFC Bank, Groww, Zerodha">
    </div>

    <div class="form-group">
      <label for="investment_type">Investment Type *</label>
      <select
        id="investment_type"
        name="investment_type"
        [(ngModel)]="investment.investment_type"
        class="form-control"
        required>
        <option value="">Select Investment Type</option>
        <option *ngFor="let type of investmentTypes" [value]="type">{{ type }}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="sub_type_name">Sub Type Name</label>
      <input
        type="text"
        id="sub_type_name"
        name="sub_type_name"
        [(ngModel)]="investment.sub_type_name"
        class="form-control"
        placeholder="e.g., SBI Bluechip Fund, Reliance ETF">
    </div>

    <div class="form-group">
      <label for="sub_type_category">Sub Type Category</label>
      <input
        type="text"
        id="sub_type_category"
        name="sub_type_category"
        [(ngModel)]="investment.sub_type_category"
        class="form-control"
        placeholder="e.g., Large Cap, Nifty 50, Banking Sector">
    </div>

    <div class="form-group">
      <label for="amount">Amount (₹) *</label>
      <input
        type="number"
        id="amount"
        name="amount"
        [(ngModel)]="investment.amount"
        class="form-control"
        required
        min="0"
        step="0.01"
        placeholder="Enter amount">
    </div>

    <div class="form-group">
      <label for="investment_date">Investment Date *</label>
      <input
        type="date"
        id="investment_date"
        name="investment_date"
        [(ngModel)]="investment.investment_date"
        class="form-control"
        required>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="!investmentForm.form.valid || loading">
        {{ isEditing ? 'Update Investment' : 'Add Investment' }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="loading">
        Cancel
      </button>
    </div>
  </form>
</div>
